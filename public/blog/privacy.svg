<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" style="background:#13131a;border-radius:16px;">
  <title>Savr keeps your expense data private on your Android device</title>

  <!-- Background grid lines -->
  <line x1="0" y1="70" x2="600" y2="70" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="140" x2="600" y2="140" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff08" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="280" stroke="#ffffff08" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="280" stroke="#ffffff08" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="280" stroke="#ffffff08" stroke-width="1"/>

  <!-- Phone -->
  <rect x="190" y="40" width="90" height="160" rx="14" fill="#1e1e2e" stroke="#7c3aed" stroke-width="2"/>
  <rect x="200" y="60" width="70" height="110" rx="6" fill="#0f0f18"/>
  <circle cx="235" cy="188" r="6" fill="#7c3aed"/>

  <!-- Lock on phone screen -->
  <rect x="218" y="88" width="34" height="28" rx="5" fill="#7c3aed"/>
  <path d="M225 88 v-10 a10 10 0 0 1 20 0 v10" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <circle cx="235" cy="100" r="4" fill="#13131a"/>
  <rect x="233" y="102" width="4" height="6" rx="1" fill="#13131a"/>

  <!-- Glow under phone -->
  <ellipse cx="235" cy="215" rx="38" ry="6" fill="#7c3aed" opacity="0.15"/>

  <!-- Dashed arrow -->
  <line x1="295" y1="120" x2="345" y2="120" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="343,114 357,120 343,126" fill="#7c3aed"/>

  <!-- Shield -->
  <path d="M365 55 L435 55 L435 130 Q435 165 400 180 Q365 165 365 130 Z" fill="#1e1e2e" stroke="#7c3aed" stroke-width="2"/>
  <path d="M383 112 l12 12 l20 -24" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Glow under shield -->
  <ellipse cx="400" cy="192" rx="38" ry="6" fill="#7c3aed" opacity="0.15"/>

  <!-- Labels -->
  <text x="235" y="234" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="sans-serif" font-weight="600">Your Device</text>
  <text x="400" y="210" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="sans-serif" font-weight="600">Protected</text>

  <!-- Top caption -->
  <text x="300" y="26" text-anchor="middle" fill="#6b7280" font-size="13" font-family="sans-serif">Your data stays on your phone — always.</text>
</svg>