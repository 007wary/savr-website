<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" style="background:#0D0B1E;border-radius:16px;">
  <title>Savr works offline — expense tracker for Indian users with no internet</title>

  <!-- Background glow -->
  <radialGradient id="glow" cx="30%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0D0B1E" stop-opacity="0"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="0" y1="70" x2="600" y2="70" stroke="#ffffff06" stroke-width="1"/>
  <line x1="0" y1="140" x2="600" y2="140" stroke="#ffffff06" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff06" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#ffffff06" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="280" stroke="#ffffff06" stroke-width="1"/>

  <!-- Phone -->
  <rect x="340" y="30" width="90" height="170" rx="14" fill="#1A1730" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="350" y="46" width="70" height="120" rx="6" fill="#110F20"/>
  <circle cx="385" cy="210" r="6" fill="#6C63FF" opacity="0.6"/>

  <!-- No wifi icon on screen -->
  <text x="385" y="95" text-anchor="middle" font-size="22" fill="#FF4444" font-family="system-ui">⚠</text>
  <text x="385" y="112" text-anchor="middle" font-size="9" fill="#666" font-family="system-ui">No internet</text>

  <!-- Expense rows on phone -->
  <rect x="354" y="120" width="62" height="14" rx="3" fill="#1E1B36"/>
  <rect x="357" y="123" width="5" height="5" rx="1" fill="#A78BFA"/>
  <text x="365" y="131" font-size="7" fill="#ccc" font-family="system-ui">Groceries</text>
  <text x="412" y="131" font-size="7" fill="#34D399" font-family="system-ui" text-anchor="end">₹680</text>

  <rect x="354" y="138" width="62" height="14" rx="3" fill="#1E1B36"/>
  <rect x="357" y="141" width="5" height="5" rx="1" fill="#FBBF24"/>
  <text x="365" y="149" font-size="7" fill="#ccc" font-family="system-ui">Transport</text>
  <text x="412" y="149" font-size="7" fill="#34D399" font-family="system-ui" text-anchor="end">₹120</text>

  <rect x="354" y="156" width="62" height="14" rx="3" fill="#1E1B36"/>
  <rect x="357" y="159" width="5" height="5" rx="1" fill="#60A5FA"/>
  <text x="365" y="167" font-size="7" fill="#ccc" font-family="system-ui">Food</text>
  <text x="412" y="167" font-size="7" fill="#34D399" font-family="system-ui" text-anchor="end">₹340</text>

  <!-- Green check — works! -->
  <circle cx="416" cy="127" r="10" fill="#34D399" fill-opacity="0.15" stroke="#34D399" stroke-width="1.5"/>
  <text x="416" y="131" text-anchor="middle" font-size="9" fill="#34D399" font-family="system-ui">✓</text>

  <!-- Glow under phone -->
  <ellipse cx="385" cy="212" rx="38" ry="5" fill="#6C63FF" opacity="0.12"/>

  <!-- Left text -->
  <text x="50" y="110" font-size="30" font-weight="800" fill="#fff" font-family="system-ui">Works</text>
  <text x="50" y="148" font-size="30" font-weight="800" fill="#6C63FF" font-family="system-ui">Offline.</text>
  <text x="50" y="178" font-size="13" fill="#666" font-family="system-ui">No internet? No problem.</text>

  <!-- Dashed signal line crossed out -->
  <line x1="180" y1="100" x2="330" y2="140" stroke="#FF4444" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>

  <!-- Bottom label -->
  <text x="50" y="248" font-size="16" font-weight="800" fill="#6C63FF" font-family="system-ui">Savr</text>
  <text x="50" y="264" font-size="10" fill="#555" font-family="system-ui">savrappindia.vercel.app</text>
</svg>