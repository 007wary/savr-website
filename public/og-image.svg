<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" style="background:#0D0B1E;">
  <title>Savr — Free Expense Tracker Built for India</title>

  <defs>
    <radialGradient id="glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D0B1E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0D0B1E"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left text -->
  <text x="100" y="220" font-size="72" font-weight="800" fill="#ffffff" font-family="system-ui">Savr</text>
  <text x="100" y="300" font-size="36" font-weight="700" fill="#6C63FF" font-family="system-ui">Free Expense Tracker</text>
  <text x="100" y="348" font-size="36" font-weight="700" fill="#6C63FF" font-family="system-ui">Built for India.</text>
  <text x="100" y="410" font-size="20" fill="#888" font-family="system-ui">Offline-first · Google Drive backup · No loan upsells</text>

  <!-- Badge -->
  <rect x="100" y="460" width="240" height="48" rx="24" fill="#6C63FF"/>
  <text x="220" y="491" text-anchor="middle" font-size="18" fill="#fff" font-family="system-ui" font-weight="600">Download Free</text>

  <!-- Phone outline -->
  <rect x="820" y="80" width="260" height="480" rx="36" fill="#1A1730" stroke="#6C63FF" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="832" y="92" width="236" height="456" rx="28" fill="#0A0A0F"/>

  <!-- Screen content -->
  <rect x="848" y="140" width="204" height="80" rx="12" fill="#6C63FF"/>
  <text x="860" y="172" font-size="11" fill="rgba(255,255,255,0.7)" font-family="system-ui">Total This Month</text>
  <text x="860" y="200" font-size="22" font-weight="700" fill="#fff" font-family="system-ui">₹24,500</text>

  <rect x="848" y="234" width="98" height="52" rx="10" fill="#13131A"/>
  <text x="860" y="256" font-size="10" fill="#888" font-family="system-ui">Income</text>
  <text x="860" y="276" font-size="13" font-weight="700" fill="#34D399" font-family="system-ui">₹45,000</text>

  <rect x="954" y="234" width="98" height="52" rx="10" fill="#13131A"/>
  <text x="966" y="256" font-size="10" fill="#888" font-family="system-ui">Expenses</text>
  <text x="966" y="276" font-size="13" font-weight="700" fill="#F87171" font-family="system-ui">₹20,500</text>

  <rect x="848" y="298" width="204" height="36" rx="8" fill="#13131A"/>
  <rect x="858" y="306" width="8" height="8" rx="2" fill="#A78BFA"/>
  <text x="874" y="321" font-size="11" fill="#ccc" font-family="system-ui">Groceries</text>
  <text x="1040" y="321" font-size="11" fill="#F87171" font-family="system-ui" text-anchor="end">-₹850</text>

  <rect x="848" y="340" width="204" height="36" rx="8" fill="#13131A"/>
  <rect x="858" y="348" width="8" height="8" rx="2" fill="#FBBF24"/>
  <text x="874" y="363" font-size="11" fill="#ccc" font-family="system-ui">Transport</text>
  <text x="1040" y="363" font-size="11" fill="#F87171" font-family="system-ui" text-anchor="end">-₹120</text>

  <rect x="848" y="382" width="204" height="36" rx="8" fill="#13131A"/>
  <rect x="858" y="390" width="8" height="8" rx="2" fill="#60A5FA"/>
  <text x="874" y="405" font-size="11" fill="#ccc" font-family="system-ui">Food</text>
  <text x="1040" y="405" font-size="11" fill="#F87171" font-family="system-ui" text-anchor="end">-₹340</text>

  <!-- Bottom URL -->
  <text x="100" y="580" font-size="16" fill="#444" font-family="system-ui">savrappindia.vercel.app</text>
</svg>